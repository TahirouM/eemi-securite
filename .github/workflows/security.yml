name: Security CI (TP4)

# Le code du TP4 a été consolidé en sous-dossiers (tp4/secure, tp4/vulnerable).
# Ce workflow exécute le pipeline de sécurité sur la version `secure` (doit passer).
# La démo "vulnerable échoue / secure passe" a été réalisée via les branches du
# même nom (voir tp4/README.md et l'onglet Actions du dépôt).

on:
  push:
    paths:
      - 'tp4/secure/**'
      - '.github/workflows/security.yml'
  pull_request:
    paths:
      - 'tp4/secure/**'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: tp4/secure

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # --- SCA ---
      - name: SCA - npm audit
        run: npm audit --audit-level=high

      # --- SAST ---
      - name: SAST - Semgrep
        if: always()
        run: |
          pip install semgrep
          semgrep --config auto --error .

      # --- Secret Scanning (branche courante uniquement) ---
      - name: Secret Scan - Gitleaks
        if: always()
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-git --redact -v --exit-code 1

      # --- Tests ---
      - name: Tests
        if: always()
        run: npm test

      # --- DAST ---
      - name: Start app
        if: always()
        run: npm start &

      - name: Wait for app
        if: always()
        run: npx wait-on http://localhost:3000

      - name: DAST - OWASP ZAP Baseline
        if: always()
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:3000'
          allow_issue_writing: false
          artifact_name: 'zap-baseline-report'
          rules_file_name: 'tp4/secure/.zap/rules.tsv'
