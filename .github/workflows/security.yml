name: Security CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # historique complet (utile pour Gitleaks)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # --- SCA : vulnérabilités des dépendances ---
      - name: SCA - npm audit
        run: npm audit --audit-level=high

      # --- SAST : patterns dangereux dans le code source ---
      - name: SAST - Semgrep
        run: |
          pip install semgrep
          semgrep --config auto --error .

      # --- Secret Scanning : secrets exposés dans le dépôt ---
      # On scanne UNIQUEMENT la branche courante (working tree), et non toutes les
      # branches : l'action officielle gitleaks-action utilise `git log --all`, ce
      # qui ferait remonter le secret de la branche `vulnerable` jusque dans
      # `secure`/`main`. Ici chaque branche est jugée sur SON propre contenu.
      - name: Secret Scan - Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-git --redact -v --exit-code 1

      # --- Tests applicatifs ---
      - name: Tests
        run: npm test

      # --- DAST : test de l'application en fonctionnement ---
      - name: Start app
        run: npm start &

      - name: Wait for app
        run: npx wait-on http://localhost:3000

      - name: DAST - OWASP ZAP Baseline
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:3000'
          allow_issue_writing: false
          artifact_name: 'zap-baseline-report'
          # Seuil du gate DAST : les alertes faible criticité sont déclassées
          # en IGNORE dans ce fichier ; les alertes Medium/High restent bloquantes.
          rules_file_name: '.zap/rules.tsv'
