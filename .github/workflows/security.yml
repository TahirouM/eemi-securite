name: Security CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # historique complet (utile pour Gitleaks)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # --- SCA : vulnérabilités des dépendances ---
      - name: SCA - npm audit
        run: npm audit --audit-level=high

      # --- SAST : patterns dangereux dans le code source ---
      - name: SAST - Semgrep
        run: |
          pip install semgrep
          semgrep --config auto --error .

      # --- Secret Scanning : secrets exposés dans le dépôt ---
      - name: Secret Scan - Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Tests applicatifs ---
      - name: Tests
        run: npm test

      # --- DAST : test de l'application en fonctionnement ---
      - name: Start app
        run: npm start &

      - name: Wait for app
        run: npx wait-on http://localhost:3000

      - name: DAST - OWASP ZAP Baseline
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          allow_issue_writing: false
